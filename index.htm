<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="./style/style.css">
        <link rel="icon" href="./assets/logo/Logo Part 1.png">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
        <title>Document</title>
    </head>

    <body>
        <main class="main">
            <section class="hero">
                <header class="header">
                    <div class="header__container">
                        <div class="header__logo">
                            <img src="./assets/logo/logo_coffe.svg" class="header__logo-icon">
                        </div>
                        <nav class="header__menu">
                            <ul class="menu__list">
                                <li class="menu-item"><a href="#" class="header__link click"><span>About us</span></a>
                                </li>
                                <li class="menu-item"><a href="#" class="header__link click">Our Product</a></li>
                                <li class="menu-item"><a href="#" class="header__link click">Delivery</a></li>
                            </ul>
                        </nav>
                        <form class="header__search">
                            <input type="text" class="header__input" placeholder="Cappuccino">
                            <button class="header__search-button">
                                <img src="./assets/icons/akar-icons_search.png" alt="search"
                                    class="header__search-icon">
                            </button>
                        </form>
                        <div id="cart" class="header__cart">
                            <img src="./assets/icons/icons_cart.png" alt="cart" class="header__cart-icon">
                        </div>
                    </div>
                </header>
            </section>

            <section class="coffe">
                <div class="coffe-container">
                    <div class="coffe-content">
                        <h1 class="coffe-title">
                            Enjoy your <span>coffee</span> <br /> before your activity
                        </h1>
                        <p class="coffe-paragraph">
                            Boost your productivity and build your mood with a <br /> glass of coffee in the morning
                        </p>
                        <div class="coffe-buttons">
                            <button type="submit" class="coffe-button button">
                                Order now
                                <div class="button__cart">
                                    <img src="./assets/icons/cart-white-icon.svg" alt="" class="button__cart-icon">
                                </div>
                            </button>
                            <a href="#" class="coffe-button button-more">More menu</a>
                        </div>
                    </div>
                    <div class="coffe-product">
                        <div class="coffe-image-box">
                            <div class="coffe-tag-wrapper tag-call">
                                <div class="coffe-tag">Cappuccino</div>
                            </div>
                            <div class="coffe-tag-wrapper tag-rate">
                                <div class="coffe-tag">4.8
                                    <img src="./assets/first page/Star.png" alt="rate">
                                </div>
                            </div>
                            <div class="coffe-tag-wrapper tag-price">
                                <div class="coffe-tag">18K</div>
                            </div>
                            <img src="./assets/first page/bg-for-product.png" alt="" class="coffe-product-bg">
                            <img src="./assets/first page/BGCoffee.png" alt="" class="enjoy__coffee-img">
                        </div>
                        <img src="./assets/first page/BG.png" class="coffe-decor">
                    </div>
                </div>
            </section>

            <section class="popular">
                <div class="popular__container">
                    <div class="popular__head">
                        <h2 class="popular__title title">
                            Popular <span>Now</span>
                            <img src="./assets/first page/BG2.png" class="popular__decor">
                        </h2>
                    </div>
                    
                    
                    <div class="popular__list">
                        
                        <div class="popular__product-wrapper">
                            <div class="popular__product">
                                <div class="popular__offer-image">
                                    <a href="#" class="popular__image-box">
                                        <img src="./assets/first page/Coffee-Product1.png" alt="Vanilla Latte" class="popular__img">
                                    </a>
                                    <div class="popular__tag-wrapper">
                                        <div class="popular__tag">
                                            4.8
                                            <img src="./assets/first page/Star.png" alt="rate" class="popular__tag-rate-icon">
                                        </div>
                                    </div>
                                </div>
                                
                                <div class="popular__offer">
                                    <div class="popular-offer">
                                        <a href="#" class="popular-offer__title">Vanilla Latte</a>
                                        <div class="popular-offer__radio">
                                            <div class="popular-offer__temp radio-active">Hot</div>
                                            <div class="popular-offer__temp">Cold</div>
                                        </div>
                                    </div>
                                    <div class="popular-offer__right">
                                        <div class="popular-offer__price">21 K</div>
                                        <div class="popular-offer__cart">
                                            <img src="./assets/icons/cart-white-icon.svg" alt="cart" class="popular-offer__cart-icon">
                                        </div>
                                    </div>
                                
                                </div>    
                            </div>

                        </div>
                        
                        
                        <div class="popular__product-wrapper">
                            <div class="popular__product">
                                <div class="popular__offer-image">
                                    <a href="#" class="popular__image-box">
                                        <img src="./assets/first page/Coffee-Product2.png" alt="Espresso" class="popular__img">
                                    </a>
                                    <div class="popular__tag-wrapper">
                                        <div class="popular__tag">
                                            4.8
                                            <img src="./assets/first page/Star.png" alt="rate" class="popular__tag-rate-icon">
                                        </div>
                                    </div>
                                </div>
                                
                                
                                <div class="popular__offer popular-offer">
                                    <div class="popular-offer__left">
                                        <a href="#" class="popular-offer__title">Espresso</a>
                                        <div class="popular-offer__radio">
                                            <div class="popular-offer__temp radio-active">Hot</div>
                                            <div class="popular-offer__temp">Cold</div>
                                        </div>
                                    </div>
                                    <div class="popular-offer">
                                        <div class="popular-offer__price">12 K</div>
                                        <div class="popular-offer__cart">
                                            <img src="./assets/icons/cart-white-icon.svg" alt="cart" class="popular-offer__cart-icon">
                                        </div>
                                    </div>
                                </div>

                            </div>
                        </div>
                       
                       
                        <div class="popular__product-wrapper">
                            <div class="popular__product">
                                <div class="popular__offer-image">
                                    <a href="#" class="popular__image-box">
                                        <img src="./assets/first page/Coffee-Product3.png" alt="Hazelnut Latte" class="popular__img">
                                    </a>
                                    <div class="popular__tag-wrapper">
                                        <div class="popular__tag">
                                            4.8
                                            <img src="./assets/first page/Star.png" alt="rate" class="popular__tag-rate-icon">
                                        </div>
                                    </div>
                                </div>
                                <div class="popular__offer popular-offer">
                                    <div class="popular-offer__left">
                                        <a href="#" class="popular-offer__title">Hazelnut Latte</a>
                                        <div class="popular-offer__radio">
                                            <div class="popular-offer__temp  radio-active">Hot</div>
                                            <div class="popular-offer__temp">Cold</div>
                                        </div>
                                    </div>
                                    <div class="popular-offer__right">
                                        <div class="popular-offer__price">23 K</div>
                                        <div class="popular-offer__cart">
                                            <img src="./assets/icons/cart-white-icon.svg" alt="cart" class="popular-offer__cart-icon">
                                        </div>
                                    </div>
                                </div>    
                            </div>
                        </div>
                        
                        <img src="./assets/first page/popular-bg.svg" class="popular__decor-bg">
                    </div>
                </div>
            </section>
            

        </main>
    </body>

</html>
